name: ECR Image Build/Push and ECS Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  docker-build-ecr-push:
    name: Docker Image Build/Push to Amazon ECR
    uses: wibaek/gha/.github/workflows/docker-build-ecr-push.yaml@v1.0
    with:
      # ECR registry와 ECS cluster가 있는 AWS region입니다.
      # 예: ap-northeast-2, us-east-1
      aws-region: ${{ vars.AWS_REGION }}

      # GitHub OIDC로 assume할 AWS IAM role ARN입니다.
      aws-role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      # push할 ECR image URI입니다.
      # 실제 값 예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/my-app
      image-name: "${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/my-app"

      # Docker build context입니다. 보통 repository root면 "."를 씁니다.
      context: "."

      # context 기준 Dockerfile 경로입니다.
      dockerfile: "./Dockerfile"

      # 빌드할 단일 CPU/OS 플랫폼입니다.
      # 선택 예: linux/amd64, linux/arm64
      platform: "linux/amd64"

      # image tag 생성 규칙입니다.
      # 실제 tag 예: 1a2b3c4d5e6f...
      tags: |
        type=raw,value=${{ github.sha }}

      # GitHub Actions cache backend를 사용합니다.
      cache-type: "gha"

      # 같은 repo에서 여러 image를 빌드하면 image마다 다른 cache-scope를 씁니다.
      cache-scope: "my-app"

  ecs-deploy:
    name: ECS Deploy
    needs: docker-build-ecr-push
    uses: wibaek/gha/.github/workflows/ecs-deploy.yaml@v1.0
    with:
      # ECS 배포에 사용할 AWS region입니다.
      aws-region: ${{ vars.AWS_REGION }}

      # GitHub OIDC로 assume할 AWS IAM role ARN입니다.
      aws-role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}

      # GitHub Environments에 표시될 환경 이름입니다.
      environment: "prod"

      # GitHub Environments에 표시될 배포 URL입니다.
      environment-url: "https://example.com"

      # 배포 대상 ECS cluster 이름입니다.
      cluster: "my-cluster"

      # 배포 대상 ECS service 이름입니다.
      service: "my-service"

      # repository 안의 ECS task definition JSON 경로입니다.
      task-definition: "ops/ecs/task-definition.json"

      # task definition 안에서 image를 교체할 container 이름입니다.
      container-name: "app"

      # 앞 docker-build-ecr-push job의 output입니다.
      # 실제 값 예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/my-app@sha256:aaaaaaaa...
      image: ${{ needs.docker-build-ecr-push.outputs.image-reference }}

      # true면 ECS service가 stable 상태가 될 때까지 기다립니다.
      wait-for-service-stability: true
