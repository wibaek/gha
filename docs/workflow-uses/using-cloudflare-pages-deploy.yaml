name: Cloudflare Pages Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cloudflare-pages-deploy:
    name: Cloudflare Pages Deploy
    uses: wibaek/gha/.github/workflows/cloudflare-pages-deploy.yaml@v1.0
    with:
      # GitHub Environments에 표시될 환경 이름입니다.
      environment: "prod"

      # GitHub Environments에 표시될 배포 URL입니다.
      environment-url: "https://example.com"

      # Cloudflare Pages project 이름입니다.
      project-name: "my-site"

      # 빌드 결과물이 생성되는 디렉터리입니다.
      pages-directory: "dist"

      # Cloudflare Pages deployment branch 값입니다.
      branch: "main"

      # 의존성 설치 명령입니다.
      install-command: "pnpm install --frozen-lockfile"

      # Pages artifact를 만들 build 명령입니다.
      build-command: "pnpm build"
    secrets:
      # Cloudflare API token입니다.
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
