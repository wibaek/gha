name: Docker Image Build/Push and Server Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-ghcr:
    name: Docker Image Build/Push to GHCR
    permissions:
      contents: read
      packages: write
    uses: wibaek/gha/.github/workflows/docker-build-ghcr-push.yaml@v1.0
    with:
      # GHCR image 이름입니다.
      # 예: ghcr.io/wibaek/my-api
      image-name: "ghcr.io/${{ github.repository }}"

      # Docker build context입니다. 보통 repository root면 "."를 씁니다.
      context: "."

      # context 기준 Dockerfile 경로입니다.
      dockerfile: "./Dockerfile"

      # 빌드할 단일 CPU/OS 플랫폼입니다.
      # 선택 예: linux/amd64, linux/arm64
      platform: "linux/amd64"

      # GitHub Actions cache backend를 사용합니다.
      cache-type: "gha"

      # 같은 repo에서 여러 image를 빌드하면 image마다 다른 cache-scope를 씁니다.
      cache-scope: "app"

  ssh-compose-image-load-deploy:
    name: SSH Docker Compose Image Load Deploy
    needs: docker-ghcr
    permissions:
      contents: read
      packages: read
    uses: wibaek/gha/.github/workflows/ssh-compose-image-load-deploy.yaml@v1.0
    with:
      host: ${{ vars.HOST }}
      port: "22"
      user: ${{ vars.USER }}
      known-hosts: ${{ vars.KNOWN_HOSTS }}
      environment: "prod"
      environment-url: "https://example.com"
      project-directory: "/srv/my-app"

      # 호출 repository에서 업로드할 compose 파일입니다.
      compose-source-file: "compose.yaml"

      # 서버 project-directory 기준 compose 파일 경로입니다.
      compose-file: "compose.yaml"

      # 앞 docker-ghcr job의 output입니다.
      # 실제 값 예: ghcr.io/wibaek/my-api@sha256:aaaaaaaa...
      image-reference: ${{ needs.docker-ghcr.outputs.image-reference }}

      # 서버에 load한 뒤 사용할 local image 이름입니다.
      # 실제 local image ref 예: my-app:1a2b3c4d5e6f
      local-image-name: "my-app"

      # compose.yaml 안의 service 이름입니다.
      service: "app"

      # 배포 후 서버에서 curl로 확인할 URL입니다.
      healthcheck-url: "http://127.0.0.1:8000/health"
    secrets:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      # 서버 app.env로 저장될 전체 runtime env 내용입니다.
      RUNTIME_ENV: ${{ secrets.PROD_APP_ENV }}
