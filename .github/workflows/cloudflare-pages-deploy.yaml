name: Cloudflare Pages Deploy

on:
  workflow_call:
    inputs:
      # runs-on label 참고: https://docs.github.com/en/actions/reference/runners/github-hosted-runners
      runs-on:
        description: "실행할 러너 라벨"
        required: false
        type: string
        default: "ubuntu-latest"

      node-version:
        description: "Wrangler 실행에 사용할 Node.js 버전"
        required: false
        type: string
        default: "22"

      working-directory:
        description: "명령어를 실행할 작업 디렉터리"
        required: false
        type: string
        default: "."

      package-manager:
        description: "사용할 패키지 매니저. 선택: npm, pnpm, yarn."
        required: false
        type: string
        default: "pnpm"

      pnpm-version:
        description: "pnpm을 사용할 때 적용할 pnpm 버전"
        required: false
        type: string
        default: "10"

      install-command:
        description: "의존성 설치 명령어. 빈 문자열이면 실행하지 않음."
        required: false
        type: string
        default: ""

      build-command:
        description: "배포 전 빌드 명령어. 빈 문자열이면 실행하지 않음."
        required: false
        type: string
        default: ""

      environment:
        description: "GitHub Environment 이름. 예: dev, stage, prod"
        required: false
        type: string
        default: "prod"

      environment-url:
        description: "GitHub Environment에 표시할 URL"
        required: false
        type: string
        default: ""

      account-id:
        description: "Cloudflare account ID. 비워두면 Wrangler 설정을 따름."
        required: false
        type: string
        default: ""

      wrangler-version:
        description: "사용할 Wrangler major 또는 version"
        required: false
        type: string
        default: "4"

      project-name:
        description: "Cloudflare Pages project 이름"
        required: true
        type: string

      pages-directory:
        description: "배포할 정적 파일 디렉터리"
        required: false
        type: string
        default: "dist"

      branch:
        description: "Cloudflare Pages deployment branch. 비워두면 github.ref_name 사용."
        required: false
        type: string
        default: ""

      deploy-args:
        description: "wrangler pages deploy에 추가로 전달할 인자"
        required: false
        type: string
        default: ""

      timeout-minutes:
        description: "job 제한 시간"
        required: false
        type: number
        default: 20

      concurrency-group:
        description: "배포 concurrency group. 비워두면 repository와 environment 기준으로 자동 생성."
        required: false
        type: string
        default: ""

      cancel-in-progress:
        description: "같은 concurrency group의 진행 중인 배포를 취소할지 여부"
        required: false
        type: boolean
        default: false

    secrets:
      CLOUDFLARE_API_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    name: Cloudflare Pages Deploy
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}

    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.environment-url }}

    concurrency:
      group: ${{ inputs.concurrency-group != '' && inputs.concurrency-group || format('deploy-{0}-{1}-cloudflare-pages', github.repository, inputs.environment) }}
      cancel-in-progress: ${{ inputs.cancel-in-progress }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: 패키지 매니저 검증
        run: |
          case "${{ inputs.package-manager }}" in
            npm|pnpm|yarn)
              ;;
            *)
              echo "지원하지 않는 package-manager: ${{ inputs.package-manager }}"
              exit 1
              ;;
          esac

      - name: Node 설정
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Corepack 활성화
        if: ${{ inputs.package-manager == 'pnpm' || inputs.package-manager == 'yarn' }}
        run: corepack enable

      - name: pnpm 준비
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack prepare "pnpm@${{ inputs.pnpm-version }}" --activate

      - name: 의존성 설치
        if: ${{ inputs.install-command != '' }}
        run: ${{ inputs.install-command }}

      - name: 빌드 실행
        if: ${{ inputs.build-command != '' }}
        run: ${{ inputs.build-command }}

      - name: Cloudflare Pages 배포
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ACCOUNT_ID: ${{ inputs.account-id }}
          WRANGLER_VERSION: ${{ inputs.wrangler-version }}
          PROJECT_NAME: ${{ inputs.project-name }}
          PAGES_DIRECTORY: ${{ inputs.pages-directory }}
          BRANCH_NAME: ${{ inputs.branch != '' && inputs.branch || github.ref_name }}
        run: |
          set -euo pipefail

          if [ -n "$ACCOUNT_ID" ]; then
            export CLOUDFLARE_ACCOUNT_ID="$ACCOUNT_ID"
          fi

          if [ ! -d "$PAGES_DIRECTORY" ]; then
            echo "pages-directory를 찾을 수 없습니다: $PAGES_DIRECTORY"
            exit 1
          fi

          npx --yes "wrangler@$WRANGLER_VERSION" pages deploy "$PAGES_DIRECTORY" \
            --project-name="$PROJECT_NAME" \
            --branch="$BRANCH_NAME" \
            ${{ inputs.deploy-args }}
