name: Docker Image Build/Push to Docker Hub

on:
  workflow_call:
    inputs:
      # runs-on label м°ёкі : https://docs.github.com/en/actions/reference/runners/github-hosted-runners
      runs-on:
        description: "мӢӨн–үн•  лҹ¬л„Ҳ лқјлІЁ"
        required: false
        type: string
        default: "ubuntu-latest"

      dockerhub-username:
        description: "лЎңк·ёмқём—җ мӮ¬мҡ©н•  Docker Hub мӮ¬мҡ©мһҗлӘ… лҳҗлҠ” мЎ°м§ҒлӘ…"
        required: true
        type: string

      image-name:
        description: "л№Ңл“ңн•  Docker Hub мқҙлҜём§Җ мқҙлҰ„. л№„мӣҢл‘җл©ҙ dockerhub-username/github.event.repository.name мӮ¬мҡ©."
        required: false
        type: string
        default: ""

      context:
        description: "л№Ңл“ң context кІҪлЎң"
        required: false
        type: string
        default: "."

      dockerfile:
        description: "мӮ¬мҡ©н•  Dockerfile кІҪлЎң"
        required: false
        type: string
        default: "./Dockerfile"

      platform:
        description: "л№Ңл“ңн•  лӢЁмқј н”Ңлһ«нҸј. мҳҲ: linux/amd64"
        required: false
        type: string
        default: "linux/amd64"

      build-args:
        description: "л№Ңл“ң мӢң docker/build-push-actionм—җ м „лӢ¬н•  build-args. лҜјк°җн•ҳм§Җ м•ҠмқҖ к°’л§Ң н—Ҳмҡ©. secret кёҲм§Җ."
        required: false
        type: string
        default: ""

      tags:
        description: "мқҙлҜём§Җ tag мғқм„ұмқ„ мң„н•ҙ docker/metadata-actionм—җ м „лӢ¬н•  к·ңм№ҷ"
        required: false
        type: string
        default: |
          type=ref,event=branch
          type=ref,event=tag
          type=sha

      pull-base-image:
        description: "л№Ңл“ң м „м—җ Dockerfileмқҳ base imageлҘј registryм—җм„ң мғҲлЎң л°ӣмқ„м§Җ м—¬л¶Җ"
        required: false
        type: boolean
        default: false

      use-cache:
        description: "л№Ңл“ң cacheлҘј мӮ¬мҡ©н• м§Җ м—¬л¶Җ"
        required: false
        type: boolean
        default: true

      cache-type:
        description: "л№Ңл“ң cache backend мў…лҘҳ. м„ нғқ: gha, registry, none."
        required: false
        type: string
        default: "gha"

      cache-scope:
        description: "мӮ¬мҡ©н•  GitHub Actions cache scope к°’. autoл©ҙ repository, context, Dockerfile кё°мӨҖмңјлЎң кі„мӮ°."
        required: false
        type: string
        default: "auto"

      cache-mode:
        description: "л№Ңл“ң cache export л°©мӢқ. м„ нғқ: min, max."
        required: false
        type: string
        default: "max"

      registry-cache-ref:
        description: "мӮ¬мҡ©н•  registry cache ref к°’. мҳҲ: docker.io/owner/repo:buildcache"
        required: false
        type: string
        default: ""

      timeout-minutes:
        description: "мһ‘м—… м ңн•ң мӢңк°„(л¶„)"
        required: false
        type: number
        default: 12

    secrets:
      DOCKERHUB_TOKEN:
        required: true

    outputs:
      image-tags:
        description: "мғқм„ұлҗң Docker image tag лӘ©лЎқ"
        value: ${{ jobs.build.outputs.image-tags }}
      image-primary-tag:
        description: "мІ« лІҲм§ё Docker image tag"
        value: ${{ jobs.build.outputs.image-primary-tag }}
      image-reference:
        description: "л°°нҸ¬м—җ мӮ¬мҡ©н•  Docker image reference. digest referenceлҘј мҡ°м„  мӮ¬мҡ©."
        value: ${{ jobs.build.outputs.image-reference }}
      image-digest:
        description: "л№Ңл“ңлҗң Docker image digest"
        value: ${{ jobs.build.outputs.image-digest }}
      image-metadata:
        description: "л№Ңл“ң кІ°кіј metadata JSON. docker/build-push-action м¶ңл Ҙк°’."
        value: ${{ jobs.build.outputs.image-metadata }}

permissions:
  contents: read

jobs:
  build:
    name: Docker Image Build/Push to Docker Hub
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}

    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}
      image-primary-tag: ${{ steps.image.outputs.primary-tag }}
      image-reference: ${{ steps.image.outputs.reference }}
      image-digest: ${{ steps.build.outputs.digest }}
      image-metadata: ${{ steps.build.outputs.metadata }}

    steps:
      - name: Docker м„Өм • кІҖмҰқ
        run: |
          set -euo pipefail

          case "${{ inputs.cache-type }}" in
            gha|registry|none)
              ;;
            *)
              echo "м§Җмӣҗн•ҳм§Җ м•ҠлҠ” cache-type: ${{ inputs.cache-type }}"
              exit 1
              ;;
          esac

          case "${{ inputs.cache-mode }}" in
            min|max)
              ;;
            *)
              echo "м§Җмӣҗн•ҳм§Җ м•ҠлҠ” cache-mode: ${{ inputs.cache-mode }}"
              exit 1
              ;;
          esac

          if [ "${{ inputs.cache-type }}" = "registry" ] && [ -z "${{ inputs.registry-cache-ref }}" ]; then
            echo "cache-typeмқҙ registryмқҙл©ҙ registry-cache-refк°Җ н•„мҡ”н•©лӢҲлӢӨ."
            exit 1
          fi

          if [ -z "${{ inputs.platform }}" ]; then
            echo "platformмқҙ л№„м–ҙ мһҲмҠөлӢҲлӢӨ."
            exit 1
          fi

          if [[ "${{ inputs.platform }}" == *,* ]]; then
            echo "docker-build-docker-hub-push.yamlмқҖ лӢЁмқј platformл§Ң м§Җмӣҗн•©лӢҲлӢӨ: ${{ inputs.platform }}"
            exit 1
          fi

      - name: мҪ”л“ң мІҙнҒ¬м•„мӣғ
        uses: actions/checkout@v6

      - name: Docker cache scope кі„мӮ°
        id: cache
        env:
          CACHE_SCOPE: ${{ inputs.cache-scope }}
          BUILD_CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          scope="$CACHE_SCOPE"

          if [ "$scope" = "auto" ]; then
            scope="${REPOSITORY}-${BUILD_CONTEXT}-${DOCKERFILE}"
          fi

          scope="$(printf '%s' "$scope" | tr '/: ' '---' | tr -cd 'A-Za-z0-9_.-')"

          if [ -z "$scope" ]; then
            echo "cache-scopeмқҙ л№„м–ҙ мһҲмҠөлӢҲлӢӨ."
            exit 1
          fi

          echo "scope=$scope" >> "$GITHUB_OUTPUT"

      - name: Docker Buildx м„Өм •
        uses: docker/setup-buildx-action@v4

      - name: Docker Hub лЎңк·ёмқё
        uses: docker/login-action@v4
        with:
          username: ${{ inputs.dockerhub-username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker мқҙлҜём§Җ л©”нғҖлҚ°мқҙн„° мғқм„ұ
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image-name != '' && inputs.image-name || format('{0}/{1}', inputs.dockerhub-username, github.event.repository.name) }}
          tags: ${{ inputs.tags }}

      - name: Docker мқҙлҜём§Җ л№Ңл“ң л°Ҹ н‘ёмӢң
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platform }}
          build-args: ${{ inputs.build-args }}
          push: true
          pull: ${{ inputs['pull-base-image'] }}
          no-cache: ${{ ! inputs['use-cache'] }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: ${{ inputs.cache-type == 'gha' && format('type=gha,scope={0}', steps.cache.outputs.scope) || inputs.cache-type == 'registry' && format('type=registry,ref={0}', inputs.registry-cache-ref) || '' }}
          cache-to: ${{ inputs.cache-type == 'gha' && format('type=gha,mode={0},scope={1},ignore-error=true', inputs.cache-mode, steps.cache.outputs.scope) || inputs.cache-type == 'registry' && format('type=registry,ref={0},mode={1}', inputs.registry-cache-ref, inputs.cache-mode) || '' }}

      - name: Docker мқҙлҜём§Җ м¶ңл Ҙ м •лҰ¬
        id: image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          primary_tag="$(printf '%s\n' "$IMAGE_TAGS" | sed -n '1p')"
          image_reference="$primary_tag"

          if [ -n "$IMAGE_DIGEST" ] && [ -n "$primary_tag" ]; then
            image_base="${primary_tag%:*}"
            image_reference="${image_base}@${IMAGE_DIGEST}"
          fi

          echo "primary-tag=$primary_tag" >> "$GITHUB_OUTPUT"
          echo "reference=$image_reference" >> "$GITHUB_OUTPUT"
