name: Docker Image Build/Push to Amazon ECR

on:
  workflow_call:
    inputs:
      # runs-on label 참고: https://docs.github.com/en/actions/reference/runners/github-hosted-runners
      runs-on:
        description: "실행할 러너 라벨"
        required: false
        type: string
        default: "ubuntu-latest"

      aws-region:
        description: "로그인할 ECR의 AWS region"
        required: true
        type: string

      aws-role-to-assume:
        description: "로그인할 ECR에 사용할 AWS IAM role ARN"
        required: true
        type: string

      aws-role-session-name:
        description: "사용할 AWS role session 이름"
        required: false
        type: string
        default: "GitHubActions"

      ecr-registries:
        description: "로그인할 ECR registry의 AWS account ID 목록. 비워두면 현재 account registry 사용."
        required: false
        type: string
        default: ""

      image-name:
        description: "빌드할 ECR image URI. 예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/my-app"
        required: true
        type: string

      context:
        description: "빌드 context 경로"
        required: false
        type: string
        default: "."

      dockerfile:
        description: "사용할 Dockerfile 경로"
        required: false
        type: string
        default: "./Dockerfile"

      platform:
        description: "빌드할 단일 플랫폼. 예: linux/amd64"
        required: false
        type: string
        default: "linux/amd64"

      build-args:
        description: "빌드 시 docker/build-push-action에 전달할 build-args. 민감하지 않은 값만 허용. secret 금지."
        required: false
        type: string
        default: ""

      tags:
        description: "이미지 tag 생성을 위해 docker/metadata-action에 전달할 규칙"
        required: false
        type: string
        default: |
          type=ref,event=branch
          type=ref,event=tag
          type=sha

      pull-base-image:
        description: "빌드 전에 Dockerfile의 base image를 registry에서 새로 받을지 여부"
        required: false
        type: boolean
        default: false

      use-cache:
        description: "빌드 cache를 사용할지 여부"
        required: false
        type: boolean
        default: true

      cache-type:
        description: "빌드 cache backend 종류. 선택: gha, registry, none."
        required: false
        type: string
        default: "gha"

      cache-scope:
        description: "사용할 GitHub Actions cache scope 값. auto면 repository, context, Dockerfile 기준으로 계산."
        required: false
        type: string
        default: "auto"

      cache-mode:
        description: "빌드 cache export 방식. 선택: min, max."
        required: false
        type: string
        default: "max"

      registry-cache-ref:
        description: "사용할 registry cache ref 값. 예: 123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/my-app:buildcache"
        required: false
        type: string
        default: ""

      timeout-minutes:
        description: "작업 제한 시간(분)"
        required: false
        type: number
        default: 12

    outputs:
      image-tags:
        description: "생성된 Docker image tag 목록"
        value: ${{ jobs.build.outputs.image-tags }}
      image-primary-tag:
        description: "첫 번째 Docker image tag"
        value: ${{ jobs.build.outputs.image-primary-tag }}
      image-reference:
        description: "배포에 사용할 Docker image reference. digest reference를 우선 사용."
        value: ${{ jobs.build.outputs.image-reference }}
      image-digest:
        description: "빌드된 Docker image digest"
        value: ${{ jobs.build.outputs.image-digest }}
      image-metadata:
        description: "빌드 결과 metadata JSON. docker/build-push-action 출력값."
        value: ${{ jobs.build.outputs.image-metadata }}

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Docker Image Build/Push to Amazon ECR
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: ${{ inputs.timeout-minutes }}

    outputs:
      image-tags: ${{ steps.meta.outputs.tags }}
      image-primary-tag: ${{ steps.image.outputs.primary-tag }}
      image-reference: ${{ steps.image.outputs.reference }}
      image-digest: ${{ steps.build.outputs.digest }}
      image-metadata: ${{ steps.build.outputs.metadata }}

    steps:
      - name: Docker 설정 검증
        run: |
          set -euo pipefail

          case "${{ inputs.cache-type }}" in
            gha|registry|none)
              ;;
            *)
              echo "지원하지 않는 cache-type: ${{ inputs.cache-type }}"
              exit 1
              ;;
          esac

          case "${{ inputs.cache-mode }}" in
            min|max)
              ;;
            *)
              echo "지원하지 않는 cache-mode: ${{ inputs.cache-mode }}"
              exit 1
              ;;
          esac

          if [ "${{ inputs.cache-type }}" = "registry" ] && [ -z "${{ inputs.registry-cache-ref }}" ]; then
            echo "cache-type이 registry이면 registry-cache-ref가 필요합니다."
            exit 1
          fi

          if [ -z "${{ inputs.platform }}" ]; then
            echo "platform이 비어 있습니다."
            exit 1
          fi

          if [[ "${{ inputs.platform }}" == *,* ]]; then
            echo "docker-build-ecr-push.yaml은 단일 platform만 지원합니다: ${{ inputs.platform }}"
            exit 1
          fi

      - name: AWS 자격 증명 설정
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws-region }}
          role-to-assume: ${{ inputs.aws-role-to-assume }}
          role-session-name: ${{ inputs.aws-role-session-name }}

      - name: Amazon ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ inputs.ecr-registries }}

      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Docker cache scope 계산
        id: cache
        env:
          CACHE_SCOPE: ${{ inputs.cache-scope }}
          BUILD_CONTEXT: ${{ inputs.context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          scope="$CACHE_SCOPE"

          if [ "$scope" = "auto" ]; then
            scope="${REPOSITORY}-${BUILD_CONTEXT}-${DOCKERFILE}"
          fi

          scope="$(printf '%s' "$scope" | tr '/: ' '---' | tr -cd 'A-Za-z0-9_.-')"

          if [ -z "$scope" ]; then
            echo "cache-scope이 비어 있습니다."
            exit 1
          fi

          echo "scope=$scope" >> "$GITHUB_OUTPUT"

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v4

      - name: Docker 이미지 메타데이터 생성
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image-name }}
          tags: ${{ inputs.tags }}

      - name: Docker 이미지 빌드 및 푸시
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platform }}
          build-args: ${{ inputs.build-args }}
          push: true
          pull: ${{ inputs['pull-base-image'] }}
          no-cache: ${{ ! inputs['use-cache'] }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: ${{ inputs.cache-type == 'gha' && format('type=gha,scope={0}', steps.cache.outputs.scope) || inputs.cache-type == 'registry' && format('type=registry,ref={0}', inputs.registry-cache-ref) || '' }}
          cache-to: ${{ inputs.cache-type == 'gha' && format('type=gha,mode={0},scope={1},ignore-error=true', inputs.cache-mode, steps.cache.outputs.scope) || inputs.cache-type == 'registry' && format('type=registry,ref={0},mode={1}', inputs.registry-cache-ref, inputs.cache-mode) || '' }}

      - name: Docker 이미지 출력 정리
        id: image
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          primary_tag="$(printf '%s\n' "$IMAGE_TAGS" | sed -n '1p')"
          image_reference="$primary_tag"

          if [ -n "$IMAGE_DIGEST" ] && [ -n "$primary_tag" ]; then
            image_base="${primary_tag%:*}"
            image_reference="${image_base}@${IMAGE_DIGEST}"
          fi

          echo "primary-tag=$primary_tag" >> "$GITHUB_OUTPUT"
          echo "reference=$image_reference" >> "$GITHUB_OUTPUT"
