name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: "사용할 Python 버전"
        required: false
        type: string
        default: "3.12"

      # runs-on label 참고: https://docs.github.com/en/actions/reference/runners/github-hosted-runners
      runs-on:
        description: "실행할 러너 라벨"
        required: false
        type: string
        default: "ubuntu-latest"

      working-directory:
        description: "명령어를 실행할 작업 디렉터리"
        required: false
        type: string
        default: "."

      python-package-tool:
        description: "Python 패키지 도구. 선택: uv, pip, poetry."
        required: false
        type: string
        default: "uv"

      install-command:
        description: "의존성 설치 명령어. auto면 python-package-tool 기준으로 자동 실행."
        required: false
        type: string
        default: "auto"

      test-command:
        description: "테스트 명령어. auto면 python-package-tool 기준으로 자동 실행, 빈 문자열이면 실행하지 않음."
        required: false
        type: string
        default: "auto"

      format-command:
        description: "포맷 검사 명령어. auto면 python-package-tool 기준으로 Ruff format check 실행, 빈 문자열이면 실행하지 않음."
        required: false
        type: string
        default: "auto"

      lint-command:
        description: "린트 명령어. auto면 python-package-tool 기준으로 Ruff lint 실행, 빈 문자열이면 실행하지 않음."
        required: false
        type: string
        default: "auto"

      typecheck-command:
        description: "타입 검사 명령어. 비워두면 실행하지 않음."
        required: false
        type: string
        default: ""

      cache-dependency-path:
        description: "uv 캐시 무효화 기준 lockfile glob. 비워두면 uv.lock 사용."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  test:
    name: Python CI
    runs-on: ${{ inputs.runs-on }}

    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Python 패키지 도구 검증
        run: |
          case "${{ inputs.python-package-tool }}" in
            uv|pip|poetry)
              ;;
            *)
              echo "지원하지 않는 python-package-tool: ${{ inputs.python-package-tool }}"
              exit 1
              ;;
          esac

      - name: Python 설정
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: uv 설정
        if: ${{ inputs.python-package-tool == 'uv' }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: ${{ inputs.cache-dependency-path != '' && inputs.cache-dependency-path || 'uv.lock' }}

      - name: 의존성 자동 설치
        if: ${{ inputs.install-command == 'auto' }}
        run: |
          case "${{ inputs.python-package-tool }}" in
            uv)
              uv sync --frozen
              ;;
            pip)
              python -m pip install --upgrade pip
              pip install -r requirements.txt
              ;;
            poetry)
              python -m pip install --upgrade pip
              pip install poetry
              poetry install --no-interaction
              ;;
          esac

      - name: 사용자 지정 의존성 설치 명령어 실행
        if: ${{ inputs.install-command != '' && inputs.install-command != 'auto' }}
        run: ${{ inputs.install-command }}

      - name: 포맷 자동 검사
        if: ${{ inputs.format-command == 'auto' }}
        run: |
          case "${{ inputs.python-package-tool }}" in
            uv)
              uv run ruff format --check .
              ;;
            pip)
              ruff format --check .
              ;;
            poetry)
              poetry run ruff format --check .
              ;;
          esac

      - name: 사용자 지정 포맷 검사 실행
        if: ${{ inputs.format-command != '' && inputs.format-command != 'auto' }}
        run: ${{ inputs.format-command }}

      - name: 린트 자동 실행
        if: ${{ inputs.lint-command == 'auto' }}
        run: |
          case "${{ inputs.python-package-tool }}" in
            uv)
              uv run ruff check .
              ;;
            pip)
              ruff check .
              ;;
            poetry)
              poetry run ruff check .
              ;;
          esac

      - name: 사용자 지정 린트 실행
        if: ${{ inputs.lint-command != '' && inputs.lint-command != 'auto' }}
        run: ${{ inputs.lint-command }}

      - name: 타입 검사 실행
        if: ${{ inputs.typecheck-command != '' }}
        run: ${{ inputs.typecheck-command }}

      - name: 테스트 자동 실행
        if: ${{ inputs.test-command == 'auto' }}
        run: |
          case "${{ inputs.python-package-tool }}" in
            uv)
              uv run pytest -q
              ;;
            pip)
              pytest -q
              ;;
            poetry)
              poetry run pytest -q
              ;;
          esac

      - name: 사용자 지정 테스트 실행
        if: ${{ inputs.test-command != '' && inputs.test-command != 'auto' }}
        run: ${{ inputs.test-command }}
