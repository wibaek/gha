name: SSH Docker Compose VPS Deploy

on:
  workflow_call:
    inputs:
      app-name:
        description: "사용할 Docker Compose 프로젝트 이름"
        required: true
        type: string

      service-name:
        description: "주 서비스 이름. compose.yaml 안의 service 이름."
        required: false
        type: string
        default: "app"

      remote-dir:
        description: "서버 배포 디렉터리. 예: /srv/my-app"
        required: true
        type: string

      compose-file:
        description: "저장소 안의 compose 파일 경로"
        required: false
        type: string
        default: "deploy/compose.yaml"

      image-reference:
        description: "배포할 Docker image reference. digest reference 권장."
        required: true
        type: string

      ghcr-login:
        description: "서버에서 ghcr.io docker login 수행 여부"
        required: false
        type: boolean
        default: true

      ghcr-username:
        description: "로그인에 사용할 GHCR 사용자명. 비우면 github.actor를 사용."
        required: false
        type: string
        default: ""

    secrets:
      VPS_HOST:
        required: true
      VPS_USER:
        required: true
      VPS_SSH_KEY:
        required: true
      VPS_SSH_KNOWN_HOSTS:
        required: false
      RUNTIME_ENV:
        description: "서버에 app.env로 쓸 전체 env 파일 내용"
        required: true
      GHCR_TOKEN:
        description: "이미지 pull에 사용할 GHCR private image 선택 token. 비우면 github.token 사용."
        required: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: SSH Docker Compose VPS Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: 배포 전제 검증
        env:
          COMPOSE_FILE: ${{ inputs.compose-file }}
          GHCR_LOGIN: ${{ inputs.ghcr-login }}
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || github.token }}
        run: |
          set -euo pipefail

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "compose-file을 찾을 수 없습니다: $COMPOSE_FILE"
            exit 1
          fi

          if [ "$GHCR_LOGIN" = "true" ] && [ -z "$GHCR_PASSWORD" ]; then
            echo "ghcr-login=true이면 github.token 또는 GHCR_TOKEN secret이 필요합니다."
            exit 1
          fi

      - name: SSH 설정
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -n "$VPS_SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$VPS_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "$VPS_HOST" > ~/.ssh/known_hosts
          fi

          chmod 600 ~/.ssh/known_hosts

      - name: 배포 파일 준비
        id: files
        env:
          IMAGE_REFERENCE: ${{ inputs.image-reference }}
          RUNTIME_ENV: ${{ secrets.RUNTIME_ENV }}
        run: |
          set -euo pipefail

          deploy_tmp_dir="$RUNNER_TEMP/compose-vps-deploy"
          mkdir -p "$deploy_tmp_dir"

          compose_env_file="$deploy_tmp_dir/compose.env"
          runtime_env_file="$deploy_tmp_dir/app.env"

          if [ -z "$RUNTIME_ENV" ]; then
            echo "RUNTIME_ENV secret이 비어 있습니다."
            exit 1
          fi

          printf 'IMAGE_REFERENCE=%s\n' "$IMAGE_REFERENCE" > "$compose_env_file"
          printf '%s' "$RUNTIME_ENV" > "$runtime_env_file"

          chmod 600 "$compose_env_file" "$runtime_env_file"

          echo "compose-env-file=$compose_env_file" >> "$GITHUB_OUTPUT"
          echo "runtime-env-file=$runtime_env_file" >> "$GITHUB_OUTPUT"

      - name: 서버 디렉터리 생성
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          REMOTE_DIR: ${{ inputs.remote-dir }}
        run: |
          set -euo pipefail

          remote_env=$(printf 'REMOTE_DIR=%q' "$REMOTE_DIR")

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "$remote_env bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$REMOTE_DIR"
          REMOTE

      - name: compose.yaml 업로드
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          REMOTE_DIR: ${{ inputs.remote-dir }}
          COMPOSE_FILE: ${{ inputs.compose-file }}
        run: |
          set -euo pipefail

          scp -i ~/.ssh/deploy_key \
            "$COMPOSE_FILE" \
            "$VPS_USER@$VPS_HOST:$REMOTE_DIR/compose.yaml.tmp"

          remote_env=$(printf 'REMOTE_DIR=%q' "$REMOTE_DIR")

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "$remote_env bash -s" <<'REMOTE'
          set -euo pipefail

          mv "$REMOTE_DIR/compose.yaml.tmp" "$REMOTE_DIR/compose.yaml"
          REMOTE

      - name: compose.env와 app.env 업로드
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          REMOTE_DIR: ${{ inputs.remote-dir }}
          COMPOSE_ENV_FILE: ${{ steps.files.outputs.compose-env-file }}
          RUNTIME_ENV_FILE: ${{ steps.files.outputs.runtime-env-file }}
        run: |
          set -euo pipefail

          scp -p -i ~/.ssh/deploy_key \
            "$COMPOSE_ENV_FILE" \
            "$VPS_USER@$VPS_HOST:$REMOTE_DIR/compose.env.tmp"

          scp -p -i ~/.ssh/deploy_key \
            "$RUNTIME_ENV_FILE" \
            "$VPS_USER@$VPS_HOST:$REMOTE_DIR/app.env.tmp"

          remote_env=$(printf 'REMOTE_DIR=%q' "$REMOTE_DIR")

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "$remote_env bash -s" <<'REMOTE'
          set -euo pipefail

          chmod 600 "$REMOTE_DIR/compose.env.tmp" "$REMOTE_DIR/app.env.tmp"
          mv "$REMOTE_DIR/compose.env.tmp" "$REMOTE_DIR/compose.env"
          mv "$REMOTE_DIR/app.env.tmp" "$REMOTE_DIR/app.env"
          chmod 600 "$REMOTE_DIR/compose.env" "$REMOTE_DIR/app.env"
          REMOTE

      - name: GHCR 로그인
        if: ${{ inputs.ghcr-login }}
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          REMOTE_DIR: ${{ inputs.remote-dir }}
          GHCR_USERNAME_INPUT: ${{ inputs.ghcr-username }}
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || github.token }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          username="$GHCR_USERNAME_INPUT"
          if [ -z "$username" ]; then
            username="$GITHUB_ACTOR"
          fi

          remote_command=$(printf 'mkdir -p %q/.docker-config-deploy && chmod 700 %q/.docker-config-deploy && DOCKER_CONFIG=%q/.docker-config-deploy docker login ghcr.io --username %q --password-stdin' \
            "$REMOTE_DIR" \
            "$REMOTE_DIR" \
            "$REMOTE_DIR" \
            "$username")

          printf '%s' "$GHCR_PASSWORD" | ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "$remote_command"

      - name: Docker Compose 배포
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          APP_NAME: ${{ inputs.app-name }}
          SERVICE_NAME: ${{ inputs.service-name }}
          REMOTE_DIR: ${{ inputs.remote-dir }}
          GHCR_LOGIN: ${{ inputs.ghcr-login }}
        run: |
          set -euo pipefail

          remote_env=$(printf 'APP_NAME=%q SERVICE_NAME=%q REMOTE_DIR=%q GHCR_LOGIN=%q' \
            "$APP_NAME" \
            "$SERVICE_NAME" \
            "$REMOTE_DIR" \
            "$GHCR_LOGIN")

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "$remote_env bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$REMOTE_DIR"
          if [ "$GHCR_LOGIN" = "true" ]; then
            export DOCKER_CONFIG="$REMOTE_DIR/.docker-config-deploy"
          fi

          docker compose -p "$APP_NAME" --env-file compose.env pull "$SERVICE_NAME"
          docker compose -p "$APP_NAME" --env-file compose.env up -d --remove-orphans "$SERVICE_NAME"
          REMOTE

      - name: GHCR 로그아웃
        if: ${{ always() && inputs.ghcr-login }}
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          REMOTE_DIR: ${{ inputs.remote-dir }}
        run: |
          set -euo pipefail

          remote_env=$(printf 'REMOTE_DIR=%q' "$REMOTE_DIR")

          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "$remote_env bash -s" <<'REMOTE' || true
          set -euo pipefail

          export DOCKER_CONFIG="$REMOTE_DIR/.docker-config-deploy"
          docker logout ghcr.io >/dev/null 2>&1 || true
          rm -rf "$DOCKER_CONFIG"
          REMOTE
